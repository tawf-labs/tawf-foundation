# Nginx configuration for Tawf Foundation subdomain routing
# This configuration maps subdomains to the React app's client-side routes
#
# Subdomain mappings:
#   zakat.tawf.foundation  →  tawf.foundation/zakat
#   qurban.tawf.foundation →  tawf.foundation/qurban
#   research.tawf.foundation → tawf.foundation/research
#
# Requirements:
# 1. Copy this file to /etc/nginx/sites-available/tawf-foundation
# 2. Create symlink: ln -s /etc/nginx/sites-available/tawf-foundation /etc/nginx/sites-enabled/
# 3. Test: nginx -t
# 4. Reload: systemctl reload nginx
# 5. DNS: Add CNAME records for each subdomain pointing to tawf.foundation

# Main domain configuration
server {
    listen 80;
    listen [::]:80;
    server_name tawf.foundation www.tawf.foundation;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tawf.foundation www.tawf.foundation;

    # SSL configuration (update paths with your actual certificates)
    # ssl_certificate /etc/ssl/certs/tawf-foundation.crt;
    # ssl_certificate_key /etc/ssl/private/tawf-foundation.key;

    # Root directory for the built React app
    root /var/www/tawf-foundation/dist;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # SPA fallback - all routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets caching
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# Zakat subdomain
server {
    listen 80;
    listen [::]:80;
    server_name zakat.tawf.foundation;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name zakat.tawf.foundation;

    # SSL configuration
    # ssl_certificate /etc/ssl/certs/tawf-foundation.crt;
    # ssl_certificate_key /etc/ssl/private/tawf-foundation.key;

    # Same root directory
    root /var/www/tawf-foundation/dist;
    index index.html;

    # Rewrite subdomain to path
    location / {
        rewrite ^/(.*)$ /zakat/$1 last;
    }

    # SPA fallback for /zakat route
    location /zakat {
        try_files $uri $uri/ /index.html;
    }
}

